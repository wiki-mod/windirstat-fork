name: Build

on:
  push:
    branches: ["feat/**", "fix/**", "master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: >
          MSBuild windirstat\windirstat.vcxproj
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=${{ matrix.platform }}
          /m /v:minimal

      - name: Upload artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: WinDirStat-${{ matrix.platform }}-${{ matrix.configuration }}
          path: windirstat\Build\WinDirStat_${{ matrix.platform }}.exe
          if-no-files-found: error
